<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mendaki Gunung</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mainRed: "#f60b0b"
          }
        }
      }
    }
  </script>
</head>

<body class="bg-black text-white selection:bg-mainRed/30">

<div class="max-w-5xl mx-auto px-4 py-16">

  <!-- FRAME -->
  <div class="relative border border-mainRed/20 rounded-3xl p-6 md:p-10 
              bg-gradient-to-b from-black/80 to-black/40 
              shadow-[0_0_80px_rgba(246,11,11,0.15)] backdrop-blur-xl overflow-hidden">

    <!-- GLOW -->
    <div class="absolute top-[-120px] left-1/2 -translate-x-1/2 w-[500px] h-[500px] 
                bg-mainRed/10 blur-[140px] rounded-full"></div>

    <!-- BACK -->
    <a href="index.html"
       class="relative z-10 text-mainRed mb-6 inline-flex items-center gap-2 hover:gap-3 transition">
      ← Back
    </a>

    <!-- TITLE -->
    <h1 class="relative z-10 text-3xl md:text-5xl font-bold mb-4">
      Mendaki Gunung
    </h1>

    <!-- DESC -->
    <p class="relative z-10 text-gray-400 mb-10 max-w-xl">
      Mendaki gunung adalah hobi yang melatih fisik dan mental serta memberikan pengalaman alam yang luar biasa.
    </p>

    <!-- SLIDER -->
    <div class="swiper mySwiper relative z-10">

      <div class="swiper-wrapper">

        <!-- ITEM -->
        <div class="swiper-slide">
          <div class="card">
            <img src="images/merbabu.jpeg">
            <div class="overlay"></div>
            <div class="text">
              <h3>Gunung Merbabu</h3>
              <p>Sabana luas & sunrise terbaik</p>
            </div>
          </div>
        </div>

        <div class="swiper-slide">
          <div class="card">
            <img src="images/ciremai.jpeg">
            <div class="overlay"></div>
            <div class="text">
              <h3>Gunung Ciremai</h3>
              <p>Tertinggi di Jawa Barat</p>
            </div>
          </div>
        </div>

        <div class="swiper-slide">
          <div class="card">
            <img src="images/gede.jpeg">
            <div class="overlay"></div>
            <div class="text">
              <h3>Gunung Gede</h3>
              <p>Jalur ramah pendaki</p>
            </div>
          </div>
        </div>

        <div class="swiper-slide">
          <div class="card">
            <img src="images/prau.jpeg">
            <div class="overlay"></div>
            <div class="text">
              <h3>Gunung Prau</h3>
              <p>Golden sunrise 360°</p>
            </div>
          </div>
        </div>

      </div>

      <!-- BUTTON -->
      <div class="swiper-button-next nav-btn"></div>
      <div class="swiper-button-prev nav-btn"></div>

      <!-- DOT -->
      <div class="swiper-pagination mt-8"></div>

    </div>

  </div>

</div>

<!-- STYLE -->
<style>

/* CARD */
.card {
  position: relative;
  width: 100%;
  aspect-ratio: 1/1;
  overflow: hidden;
  border-radius: 26px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  transition: all 0.5s ease;
}

/* IMAGE */
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.6s ease;
}

/* HOVER */
.card:hover img {
  transform: scale(1.15);
}

/* OVERLAY */
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
}

/* TEXT */
.text {
  position: absolute;
  bottom: 0;
  padding: 22px;
  transform: translateY(20px);
  opacity: 0;
  transition: 0.4s;
}

.card:hover .text {
  transform: translateY(0);
  opacity: 1;
}

.text h3 {
  font-size: 18px;
  font-weight: 600;
}

.text p {
  font-size: 13px;
  color: #ccc;
}

/* SLIDE EFFECT */
.swiper-slide {
  opacity: 0.4;
  transform: scale(0.85);
  transition: all 0.4s ease;
}

.swiper-slide-active {
  opacity: 1;
  transform: scale(1);
}

.swiper-slide-active .card {
  box-shadow: 0 0 60px rgba(246,11,11,0.35);
}

/* NAV BUTTON */
.nav-btn {
  width: 50px;
  height: 50px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 50%;
  transition: 0.3s;
}

/* ICON */
.swiper-button-next::after,
.swiper-button-prev::after {
  font-size: 18px;
  font-weight: bold;
  color: #f60b0b;
}

/* HOVER */
.nav-btn:hover {
  background: #f60b0b;
  transform: scale(1.1);
}

.nav-btn:hover::after {
  color: white;
}

/* POSITION */
.swiper-button-prev {
  left: -15px;
}
.swiper-button-next {
  right: -15px;
}

/* MOBILE */
@media (max-width: 640px) {
  .swiper-button-prev { left: 5px; }
  .swiper-button-next { right: 5px; }
}

/* DOT */
.swiper-pagination-bullet {
  background: #666;
  opacity: 0.5;
}

.swiper-pagination-bullet-active {
  background: #f60b0b;
  transform: scale(1.3);
  opacity: 1;
}

</style>

<!-- SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const swiper = new Swiper(".mySwiper", {
  centeredSlides: true,
  spaceBetween: 25,
  grabCursor: true,

  breakpoints: {
    0: {
      slidesPerView: 1
    },
    640: {
      slidesPerView: 1.2
    },
    1024: {
      slidesPerView: 2
    }
  },

  pagination: {
    el: ".swiper-pagination",
    clickable: true,
  },

  navigation: {
    nextEl: ".swiper-button-next",
    prevEl: ".swiper-button-prev",
  },
});
</script>

</body>
</html>
